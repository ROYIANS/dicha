# vidorra self-hosted stack
# Quick start:  ./deploy.sh   (Linux/macOS)  or  .\deploy.ps1   (Windows)
# Re-run anytime to upgrade: stops containers, no-cache rebuild, recreates (DB kept).
# Blank slate:  ./deploy.sh --fresh   or   .\deploy.ps1 -Fresh

services:
  postgres:
    image: postgres:16-alpine
    container_name: vidorra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vidorra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidorra}
      POSTGRES_DB: ${POSTGRES_DB:-vidorra}
    volumes:
      - vidorra-pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-vidorra} -d ${POSTGRES_DB:-vidorra}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  casdoor:
    image: casbin/casdoor:latest
    container_name: vidorra-casdoor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUNNING_IN_DOCKER: 'true'
      # Casdoor 连接 Postgres（与 api 共用同一 DB，不同 schema/前缀）
      driverName: postgres
      dataSourceName: postgresql://${POSTGRES_USER:-vidorra}:${POSTGRES_PASSWORD:-vidorra}@postgres:5432/${POSTGRES_DB:-vidorra}?sslmode=disable&search_path=casdoor
      # Casdoor 外部访问地址（需与 .env CASDOOR_ENDPOINT 一致）
      origin: ${CASDOOR_ORIGIN:-http://localhost:8000}
    ports:
      - '${CASDOOR_PORT:-8000}:8000'
    volumes:
      - vidorra-casdoor-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8000/api/get-account >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: vidorra-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      casdoor:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vidorra}:${POSTGRES_PASSWORD:-vidorra}@postgres:5432/${POSTGRES_DB:-vidorra}?schema=public
      PORT: '3000'
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 8

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_DEV_BYPASS_AUTH: ${VITE_DEV_BYPASS_AUTH:-true}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
    container_name: vidorra-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1/ >/dev/null']
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  vidorra-pgdata:
  vidorra-casdoor-data:
