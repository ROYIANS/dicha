# dicha self-hosted stack
# Quick start:  ./deploy.sh   (Linux/macOS)  or  .\deploy.ps1   (Windows)
# Re-run anytime to upgrade: stops containers, no-cache rebuild, recreates (DB kept).
# Blank slate:  ./deploy.sh --fresh   or   .\deploy.ps1 -Fresh

services:
  postgres:
    image: postgres:16-alpine
    container_name: dicha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dicha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dicha}
      POSTGRES_DB: ${POSTGRES_DB:-dicha}
    volumes:
      - dicha-pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-dicha} -d ${POSTGRES_DB:-dicha}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  api:
    image: ${IMAGE_PREFIX:-ghcr.io/royians/dicha}-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: dicha-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dicha}:${POSTGRES_PASSWORD:-dicha}@postgres:5432/${POSTGRES_DB:-dicha}?schema=public
      PORT: '3000'
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      DICHA_SUPER_ADMIN_EMAILS: ${DICHA_SUPER_ADMIN_EMAILS:-}
      ALTCHA_HMAC_SECRET: ${ALTCHA_HMAC_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      UPLOAD_DIR: /data/uploads
      AI_GATEWAY_BASE_URL: ${AI_GATEWAY_BASE_URL:-http://ai-gateway:3100/ai}
      AI_GATEWAY_INTERNAL_TOKEN: ${AI_GATEWAY_INTERNAL_TOKEN:-}
    volumes:
      - dicha-uploads:/data/uploads
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 8

  ai-gateway:
    image: ${IMAGE_PREFIX:-ghcr.io/royians/dicha}-ai-gateway:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-gateway
    container_name: dicha-ai-gateway
    restart: unless-stopped
    environment:
      PORT: '3100'
      AI_GATEWAY_INTERNAL_TOKEN: ${AI_GATEWAY_INTERNAL_TOKEN:-}
      AI_GATEWAY_SECRET_KEY: ${AI_GATEWAY_SECRET_KEY}
      AI_GATEWAY_DATA_DIR: /data/ai-gateway
    volumes:
      - dicha-ai-gateway-data:/data/ai-gateway
    expose:
      - '3100'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3100/ai/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  web:
    image: ${IMAGE_PREFIX:-ghcr.io/royians/dicha}-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
    container_name: dicha-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1/ >/dev/null']
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  dicha-pgdata:
  dicha-uploads:
  dicha-ai-gateway-data:
